name: cyberspex_ecommerce
description: Cyberspex Technologies E-commerce App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.0
  supabase_flutter: ^2.12.0
  google_sign_in: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.3"
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/images/smartphones/mobile2.jpg
    - lib/images/laptops/laptop1.jpg
    - lib/images/headphones/pods1.jpg

flutter_launcher_icons:
  android: "launcher_icon" # can be true, false, or a custom name
  ios: true # can be true, false, or a custom name
  image_path: "assets/icons/icon.jpeg" # path to your icon
  # Optional: for Android adaptive icons
  adaptive_icon_background: "#ffffff"

